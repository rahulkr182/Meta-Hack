spec_version: 1
name: sql_query_env
description: >
  An OpenEnv-compliant environment where AI agents learn to write SQL queries
  against database schemas. The agent receives a schema and a natural-language
  question, then submits SQL queries. The environment executes them against an
  in-memory SQLite database and returns graded feedback with partial-progress
  reward signals (0.0-1.0).

type: space
runtime: fastapi
app: sql_env.server.app:app
port: 7860

# Task definitions
tasks:
  - id: easy_01
    difficulty: easy
    description: "List all employees in the Sales department"
    concepts: "JOIN + WHERE"
  - id: easy_02
    difficulty: easy
    description: "Count orders placed in 2024"
    concepts: "COUNT + WHERE"
  - id: easy_03
    difficulty: easy
    description: "List distinct product categories"
    concepts: "SELECT from table"
  - id: medium_01
    difficulty: medium
    description: "Total revenue per product category"
    concepts: "Multi-JOIN + GROUP BY + SUM"
  - id: medium_02
    difficulty: medium
    description: "Employees managing more than 2 people"
    concepts: "Self-JOIN + HAVING"
  - id: medium_03
    difficulty: medium
    description: "Customers with at least 2 orders"
    concepts: "JOIN + GROUP BY + HAVING"
  - id: hard_01
    difficulty: hard
    description: "Rank departments by average salary"
    concepts: "AVG + RANK() OVER"
  - id: hard_02
    difficulty: hard
    description: "Products never ordered"
    concepts: "LEFT JOIN + IS NULL"
  - id: hard_03
    difficulty: hard
    description: "Cumulative total of order amounts"
    concepts: "SUM() OVER (running total)"

# Schemas
action:
  type: object
  properties:
    sql_query:
      type: string
      description: "SQL query to execute"
      min_length: 1

observation:
  type: object
  properties:
    schema_description:
      type: string
    question:
      type: string
    task_id:
      type: string
    task_difficulty:
      type: string
      enum: [easy, medium, hard]
    execution_result:
      type: string
    execution_error:
      type: string
    feedback:
      type: string
    reward_breakdown:
      type: object
    done:
      type: boolean
    reward:
      type: number
      minimum: 0.0
      maximum: 1.0

state:
  type: object
  properties:
    episode_id:
      type: string
    step_count:
      type: integer
    current_task_id:
      type: string
    attempts:
      type: integer
    max_attempts:
      type: integer
    best_reward:
      type: number
    is_solved:
      type: boolean

# Reward function
reward:
  type: composite
  range: [0.0, 1.0]
  components:
    syntax_valid: { weight: 0.10, description: "Query parses without error" }
    execution_success: { weight: 0.10, description: "Query runs without runtime error" }
    correct_tables: { weight: 0.15, description: "References the right tables" }
    correct_columns: { weight: 0.15, description: "Selects the right columns" }
    partial_row_match: { weight: 0.20, description: "Jaccard similarity of result rows" }
    exact_match: { weight: 0.30, description: "Results exactly match gold standard" }

# Tags
tags:
  - openenv
  - sql
  - rl-environment
  - agent-training
